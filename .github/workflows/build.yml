name: Build Nationalball GLB Viewer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create directories
      run: |
        mkdir include -Force
        mkdir lib -Force
        mkdir include\GL -Force
    
    - name: Install MinGW
      run: |
        choco install mingw -y
        echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $env:GITHUB_PATH
    
    - name: Download GLFW
      run: |
        Invoke-WebRequest -Uri "https://github.com/glfw/glfw/releases/download/3.4/glfw-3.4.bin.WIN64.zip" -OutFile "glfw.zip"
        Expand-Archive -Path glfw.zip -DestinationPath .
        Move-Item -Path "glfw-3.4.bin.WIN64\include\*" -Destination "include\" -Force
        Copy-Item -Path "glfw-3.4.bin.WIN64\lib-mingw-w64\*.a" -Destination "lib\" -Force
        echo "✅ GLFW downloaded"
    
    - name: Download GLEW
      run: |
        Invoke-WebRequest -Uri "https://github.com/nigels-com/glew/releases/download/glew-2.2.0/glew-2.2.0-win32.zip" -OutFile "glew.zip"
        Expand-Archive -Path glew.zip -DestinationPath .
        Copy-Item -Path "glew-2.2.0\include\GL\*" -Destination "include\GL\" -Recurse -Force
        Copy-Item -Path "glew-2.2.0\lib\Release\Win32\*.a" -Destination "lib\" -Force
        echo "✅ GLEW downloaded"
    
    - name: Download TinyGLTF and dependencies
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/syoyo/tinygltf/master/tiny_gltf.h" -OutFile "include\tiny_gltf.h"
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp" -OutFile "include\json.hpp"
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/nothings/stb/master/stb_image.h" -OutFile "include\stb_image.h"
        echo "✅ TinyGLTF, json.hpp, and stb_image.h downloaded"
    
    - name: Compile game
      run: |
        echo "🔨 Compiling GLB viewer..."
        g++ --version
        g++ -O2 -static -o nationalball.exe game.cpp -Iinclude -Llib -lglfw3 -lglew32 -lopengl32 -lgdi32 -lwinmm -lpthread -ldl
        echo "✅ Build complete!"
        dir *.exe
    
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: nationalball-windows
        path: nationalball.exe
