name: Build Nationalball Viewer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create directories
      run: |
        mkdir include -Force
        mkdir lib -Force
    
    - name: Install MinGW
      run: |
        choco install mingw -y
        echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $env:GITHUB_PATH
    
    - name: Download GLFW
      run: |
        Invoke-WebRequest -Uri "https://github.com/glfw/glfw/releases/download/3.4/glfw-3.4.bin.WIN64.zip" -OutFile "glfw.zip"
        Expand-Archive -Path glfw.zip -DestinationPath .
        Move-Item -Path "glfw-3.4.bin.WIN64\include\*" -Destination "include\" -Force
        Copy-Item -Path "glfw-3.4.bin.WIN64\lib-mingw-w64\*.a" -Destination "lib\" -Force
    
    - name: Download GLEW
      run: |
        Invoke-WebRequest -Uri "https://github.com/nigels-com/glew/releases/download/glew-2.2.0/glew-2.2.0-win32.zip" -OutFile "glew.zip"
        Expand-Archive -Path glew.zip -DestinationPath .
        New-Item -ItemType Directory -Path "include\GL" -Force
        Copy-Item -Path "glew-2.2.0\include\GL\*" -Destination "include\GL\" -Recurse -Force
        Copy-Item -Path "glew-2.2.0\lib\Release\Win32\*.a" -Destination "lib\" -Force
    
    - name: Download Assimp
      run: |
        Invoke-WebRequest -Uri "https://github.com/assimp/assimp/releases/download/v5.3.1/assimp-5.3.1-win64.zip" -OutFile "assimp.zip"
        Expand-Archive -Path assimp.zip -DestinationPath .
        Move-Item -Path "assimp-5.3.1-win64\include\assimp" -Destination "include\assimp" -Force
        Copy-Item -Path "assimp-5.3.1-win64\lib\*.a" -Destination "lib\" -Force
    
    - name: Compile viewer
      run: |
        echo "🔨 Compiling 3D viewer..."
        g++ --version
        g++ -O2 -static -o nationalball.exe game.cpp -Iinclude -Llib -lglfw3 -lglew32 -lassimp -lopengl32 -lgdi32 -lwinmm -lpthread -ldl
        echo "✅ Build complete!"
        dir *.exe
    
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: nationalball-windows
        path: nationalball.exe
