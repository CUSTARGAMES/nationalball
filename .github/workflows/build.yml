name: Build Nationalball (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download Raylib
      run: |
        Invoke-WebRequest -Uri "https://github.com/raysan5/raylib/releases/download/5.0/raylib-5.0_win64_msvc16.zip" -OutFile "raylib.zip"
        Expand-Archive -Path raylib.zip -DestinationPath .
        mkdir include
        mkdir lib
        Copy-Item -Path "raylib-5.0_win64_msvc16\include\*" -Destination "include\" -Recurse
        Copy-Item -Path "raylib-5.0_win64_msvc16\lib\*" -Destination "lib\" -Recurse
    
    - name: Compile game
      run: |
        g++ -O2 -o nationalball.exe nationalball.cpp -Iinclude -Llib -lraylib -lgdi32 -lwinmm
    
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: nationalball-windows
        path: nationalball.exe
