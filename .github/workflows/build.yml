name: Build Nationalball (Simple OpenGL)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create directories
      run: |
        mkdir include
        mkdir lib
    
    - name: Install MinGW
      run: |
        choco install mingw -y
        echo "C:\mingw64\bin" >> $env:GITHUB_PATH
    
    - name: Download GLFW
      run: |
        Invoke-WebRequest -Uri "https://github.com/glfw/glfw/releases/download/3.4/glfw-3.4.bin.WIN64.zip" -OutFile "glfw.zip"
        Expand-Archive -Path glfw.zip -DestinationPath .
        Move-Item -Path "glfw-3.4.bin.WIN64\include\*" -Destination "include\" -Force
        Copy-Item -Path "glfw-3.4.bin.WIN64\lib-mingw-w64\*.a" -Destination "lib\" -Force
        echo "GLFW downloaded"
    
    - name: Download GLM
      run: |
        Invoke-WebRequest -Uri "https://github.com/g-truc/glm/releases/download/1.0.1/glm-1.0.1-light.zip" -OutFile "glm.zip"
        Expand-Archive -Path glm.zip -DestinationPath .
        Move-Item -Path "glm\glm" -Destination "include\glm" -Force
        echo "GLM downloaded"
    
    - name: Compile game (no GLEW)
      run: |
        echo "Compiling with OpenGL + GLFW..."
        g++ --version
        g++ -O2 -static -o nationalball.exe nationalball.cpp -Iinclude -Llib -lglfw3 -lopengl32 -lgdi32 -lwinmm -lpthread -ldl
        echo "Build complete!"
        dir *.exe
    
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: nationalball-windows
        path: nationalball.exe
