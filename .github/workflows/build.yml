name: Build Nationalball (Raylib)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create directories
      run: |
        mkdir include
        mkdir lib
    
    - name: Download Raylib (MinGW version)
      run: |
        Invoke-WebRequest -Uri "https://github.com/raysan5/raylib/releases/download/5.0/raylib-5.0_win64_mingw-w64.zip" -OutFile "raylib.zip"
        Expand-Archive -Path raylib.zip -DestinationPath .
        Move-Item -Path "raylib-5.0_win64_mingw-w64\include\*" -Destination "include\" -Force
        Move-Item -Path "raylib-5.0_win64_mingw-w64\lib\*" -Destination "lib\" -Force
        echo "Raylib downloaded"
        dir lib
    
    - name: Compile game
      run: |
        echo "Compiling..."
        g++ --version
        g++ -O2 -static -o nationalball.exe nationalball.cpp -Iinclude -Llib -lraylib -lopengl32 -lgdi32 -lwinmm -lpthread -ldl
        echo "Build complete!"
        dir *.exe
    
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: nationalball-windows
        path: nationalball.exe
